name: Refresh NEON data bundle

# Monthly rebuild of the surface-water-chemistry bundle (data/neon_swc.rds +
# data/analyte_coverage.csv), then a direct push to main. Runs late on the FIRST
# SATURDAY NIGHT of each month (~11pm Arizona time) so any republish lands off-peak.
# NEON publishes on a lag, so a monthly pull keeps the bundled data current. Posit
# Connect Cloud auto-republishes on every push to main.
#
# This app pulls the NEON PUBLIC API directly (scripts/precompute_neon_data.R) —
# no neonUtilities, no NEON token needed. A completeness guard in
# scripts/refresh_data.R aborts before the PR if a bad-API day produced a shrunken
# bundle, so the committed data is never clobbered with a partial pull.
# Trigger manually any time from the Actions tab (workflow_dispatch).

on:
  schedule:
    # Every Sunday 06:00 UTC == Saturday 23:00 America/Phoenix (Arizona, no DST).
    # Cron can't express "first Saturday of the month", so we fire every Saturday
    # night and let the `gate` job below proceed only on the first one.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      skip_download:
        description: "Skip the NEON re-pull; just redeploy the committed bundle to main (fast test)"
        type: boolean
        default: false

permissions:
  contents: write          # commit the refreshed bundle to the PR branch
  pull-requests: write     # open/update the data-refresh PR

jobs:
  # Gate: only the FIRST Saturday night (Arizona time) runs the heavy refresh.
  # Manual runs (workflow_dispatch) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          dow=$(TZ='America/Phoenix' date +%u)    # 6 = Saturday
          day=$(TZ='America/Phoenix' date +%-d)   # day-of-month, no leading zero
          if [ "$dow" = "6" ] && [ "$day" -le 7 ]; then
            echo "First Saturday in Arizona (day $day) — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the first Saturday in Arizona (dow=$dow day=$day) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # push to main -> Connect Cloud auto-redeploys

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Pulls the NEON public API directly — only these light deps, no neonUtilities.
      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: >
            jsonlite, dplyr, tidyr, readr

      # Pull + rebuild data/neon_swc.rds, then guard against a shrunken bundle
      # (the guard stop()s the job before the PR if the pull collapsed).
      - name: Refresh the surface-water-chemistry bundle (full NEON re-pull)
        if: ${{ github.event.inputs.skip_download != 'true' }}
        run: Rscript scripts/refresh_data.R

      # Commit + push refreshed data DIRECTLY to main. THIS is the deploy: the push
      # makes Connect Cloud auto-republish (matching the SM / Veg / Plant / Beetle
      # siblings, and the suite standard of auto-push to the watched branch, not
      # PR-merge). The completeness guard in refresh_data.R already stop()s before
      # here if the pull came back shrunken. Guarded so it no-ops when nothing changed.
      - name: Commit & push refreshed data to main
        run: |
          git config user.name  "neon-data-bot"
          git config user.email "neon-data-bot@users.noreply.github.com"
          git add data/neon_swc.rds   # analyte_coverage.csv is gitignored (not deployed); only the bundle is committed
          if git diff --cached --quiet; then
            echo "No data changes - nothing to commit or deploy."
          else
            git commit -m "data: monthly NEON surface-water-chemistry refresh [bot]"
            git push origin HEAD:main
            echo "Pushed refreshed data to main - Connect Cloud will redeploy."
          fi
